<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"/>
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3QgZmlsbD0iIzBhMGEwYSIgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIi8+CiAgPHBhdGggZD0iTTggOCBMMjQgOCBMMjQgMjQgTDggMjQgWiBNMTIgMTIgTDIwIDEyIEwyMCAyMCBMMTIgMjAgWiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZTBlMGUwIiBzdHJva2Utd2lkdGg9IjEuNSIvPgo8L3N2Zz4K"/>
<title>DNA Double Helix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#030510;overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none}
#info{position:fixed;bottom:max(16px,env(safe-area-inset-bottom,16px));left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.75);background:rgba(0,0,0,0.55);padding:6px 14px;border-radius:6px;font:12px/1.5 ui-monospace,monospace;pointer-events:none;text-align:center;white-space:nowrap}
.back-btn{position:fixed;top:max(16px,env(safe-area-inset-top,16px));right:max(16px,env(safe-area-inset-right,16px));background:rgba(20,20,20,0.8);border:1px solid #444;color:#e0e0e0;padding:8px 14px;border-radius:6px;font:12px ui-monospace,monospace;cursor:pointer;text-decoration:none;backdrop-filter:blur(8px);z-index:1000;min-height:44px;display:flex;align-items:center;transition:border-color 0.2s}
.back-btn:hover{border-color:#888}
</style>
</head>
<body>
<a href="./" class="back-btn">← Gallery</a>
<canvas id="c"></canvas>
<div id="info">DNA double helix · Watson–Crick base pairs · drag to tilt · pinch or scroll to zoom</div>
<script>
(function(){
'use strict';
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;
function resize(){
  W=c.width=innerWidth;H=c.height=innerHeight;
  RADIUS_BASE=Math.min(W,H)*0.16; // responsive helix radius
}
resize();
addEventListener('resize',resize);

// hide UI when in iframe
if(window.self!==window.top){
  document.querySelector('.back-btn').style.display='none';
  document.getElementById('info').style.display='none';
}

// parameters
const RUNGS=60;         // base pairs
const PITCH=32;         // px per full turn (vertical)
const TURNS=12;         // number of full turns visible
let RADIUS_BASE=Math.min(innerWidth,innerHeight)*0.16; // responsive, updated on resize

let zoom=1.0;
let tiltX=0.18;         // 3D tilt (radians)
let phase=0;            // rotation phase
let speed=0.008;

// drag + pinch
let dragging=false,lastY=0,pinchDist=0;
c.addEventListener('pointerdown',e=>{c.setPointerCapture(e.pointerId);dragging=true;lastY=e.clientY});
c.addEventListener('pointermove',e=>{
  if(!dragging)return;
  tiltX+=(e.clientY-lastY)*0.003;
  tiltX=Math.max(-0.5,Math.min(0.5,tiltX));
  lastY=e.clientY;
});
c.addEventListener('pointerup',()=>dragging=false);
c.addEventListener('pointercancel',()=>dragging=false);
addEventListener('wheel',e=>{
  zoom*=e.deltaY>0?0.95:1.05;
  zoom=Math.max(0.4,Math.min(2.5,zoom));
  e.preventDefault();
},{passive:false});
// pinch-to-zoom
c.addEventListener('touchstart',e=>{if(e.touches.length===2)pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)},{passive:true});
c.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinchDist>0){zoom*=d/pinchDist;zoom=Math.max(0.4,Math.min(2.5,zoom));}
    pinchDist=d;
    e.preventDefault();
  }
},{passive:false});

// base pair colors: A-T cyan/amber, G-C magenta/lime
const PAIR_COLORS=[
  ['#00cfff','#ff9900'],
  ['#ff3399','#66ff66'],
  ['#00cfff','#ff9900'],
  ['#66ff66','#ff3399'],
];

function project(x,y,z){
  // simple perspective + tilt
  const cosT=Math.cos(tiltX),sinT=Math.sin(tiltX);
  const ty=y*cosT-z*sinT;
  const tz=y*sinT+z*cosT;
  const fov=900;
  const scale=fov/(fov+tz+400);
  return{
    sx:W/2+x*scale,
    sy:H/2+ty*scale,
    scale,
    z:tz
  };
}

// collect all renderable segments each frame and depth-sort
function drawFrame(){
  ctx.fillStyle='rgba(3,5,16,0.22)';
  ctx.fillRect(0,0,W,H);

  const R=RADIUS_BASE*zoom;
  const totalH=PITCH*TURNS*zoom;
  const startY=-totalH/2;
  const rungCount=RUNGS*TURNS;
  const dy=totalH/rungCount;
  const dAngle=(Math.PI*2)/RUNGS;

  // build segment list
  const segs=[];
  for(let i=0;i<rungCount;i++){
    const t=i/rungCount;
    const yPos=startY+i*dy;
    const angle=phase+i*dAngle;

    // strand A
    const ax=Math.cos(angle)*R;
    const az=Math.sin(angle)*R;
    // strand B (opposite)
    const bx=Math.cos(angle+Math.PI)*R;
    const bz=Math.sin(angle+Math.PI)*R;

    const pA=project(ax,yPos,az);
    const pB=project(bx,yPos,bz);

    // depth of midpoint for sorting
    const midZ=(pA.z+pB.z)/2;

    segs.push({pA,pB,i,midZ,t});
  }

  // sort by z (painter's algorithm — draw back to front)
  segs.sort((a,b)=>a.midZ-b.midZ);

  // draw backbone segments between adjacent rungs
  // we need ordered strand points for backbone lines
  // draw them before rungs for depth layering — simplified approach: draw all, accept z-fight on backbone
  // backbone strand A
  const strandA=[],strandB=[];
  for(let i=0;i<rungCount;i++){
    const yPos=startY+i*dy;
    const angle=phase+i*dAngle;
    const ax=Math.cos(angle)*R;
    const az=Math.sin(angle)*R;
    const bx=Math.cos(angle+Math.PI)*R;
    const bz=Math.sin(angle+Math.PI)*R;
    strandA.push(project(ax,yPos,az));
    strandB.push(project(bx,yPos,bz));
  }

  function drawStrand(pts,hue){
    ctx.lineWidth=3.5*zoom;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    for(let i=1;i<pts.length;i++){
      const p=pts[i-1],q=pts[i];
      const alpha=0.55+0.45*(p.scale+q.scale)/2*1.2;
      ctx.beginPath();
      ctx.moveTo(p.sx,p.sy);
      ctx.lineTo(q.sx,q.sy);
      ctx.strokeStyle=`hsla(${hue},80%,60%,${Math.min(1,alpha)})`;
      ctx.stroke();
    }
  }

  drawStrand(strandA,200);  // cyan-blue
  drawStrand(strandB,280);  // purple

  // draw rungs (base pairs) sorted by depth
  for(const seg of segs){
    const {pA,pB,i,t}=seg;
    const col=PAIR_COLORS[i%PAIR_COLORS.length];
    const depthAlpha=0.6+0.4*((seg.midZ+500)/1000);
    const a=Math.max(0.3,Math.min(1,depthAlpha));
    const lw=Math.max(1,(2.2+pA.scale)*zoom*0.8);

    // rung line
    const midX=(pA.sx+pB.sx)/2;
    const midY=(pA.sy+pB.sy)/2;

    const grad=ctx.createLinearGradient(pA.sx,pA.sy,pB.sx,pB.sy);
    grad.addColorStop(0,col[0]+hex(a));
    grad.addColorStop(0.5,'rgba(255,255,255,'+a*0.5+')');
    grad.addColorStop(1,col[1]+hex(a));
    ctx.beginPath();
    ctx.moveTo(pA.sx,pA.sy);
    ctx.lineTo(pB.sx,pB.sy);
    ctx.strokeStyle=grad;
    ctx.lineWidth=lw;
    ctx.stroke();

    // dots at ends
    const r=Math.max(2,(3+pA.scale)*zoom*0.5);
    ctx.beginPath();
    ctx.arc(pA.sx,pA.sy,r,0,Math.PI*2);
    ctx.fillStyle=col[0]+hex(a);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(pB.sx,pB.sy,r,0,Math.PI*2);
    ctx.fillStyle=col[1]+hex(a);
    ctx.fill();
  }
}

function hex(a){
  const v=Math.round(Math.min(1,a)*255).toString(16).padStart(2,'0');
  return v;
}

function loop(){
  phase+=speed;
  drawFrame();
  requestAnimationFrame(loop);
}
loop();
})();
</script>
</body>
</html>
