<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julia Set</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; touch-action: none; }
  canvas { display: block; cursor: crosshair; }
  .ui {
    position: fixed; bottom: 1rem; left: 1rem;
    font: 0.75rem/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #aaa; background: rgba(10,10,10,0.85);
    padding: 0.5rem 0.8rem; border-radius: 4px;
    pointer-events: none;
  }
  .hint {
    position: fixed; top: 1rem; right: 1rem;
    font: 0.75rem/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #666; background: rgba(10,10,10,0.75);
    padding: 0.4rem 0.7rem; border-radius: 4px;
    pointer-events: none;
  }
  .back {
    position: fixed; top: 1rem; left: 1rem;
    font: 0.8rem/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #aaa; background: rgba(10,10,10,0.85);
    padding: 0.5rem 0.8rem; border-radius: 4px;
    text-decoration: none; border: 1px solid #333;
    transition: border-color 0.2s;
    z-index: 10;
  }
  .back:hover { border-color: #666; color: #fff; }
  .in-iframe .back, .in-iframe .ui, .in-iframe .hint { display: none; }
</style>
</head>
<body>
<a class="back" href="index.html">← gallery</a>
<canvas id="c"></canvas>
<div class="ui" id="ui">c = 0.000 + 0.000i</div>
<div class="hint" id="hint">move mouse to explore · click to lock</div>
<script>
if (window.self !== window.top) document.body.classList.add('in-iframe');

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const hint = document.getElementById('hint');

let W, H;
let imgData;
let animC = { re: -0.7269, im: 0.1889 }; // auto-orbit starting point
let currentC = { ...animC };
let locked = false;
let mouseActive = false;

// Interesting preset c-values to orbit through
const PRESETS = [
  { re: -0.7269, im: 0.1889 },  // dendrite
  { re: -0.4,    im: 0.6 },     // spiral arms
  { re: 0.285,   im: 0.01 },    // classic rabbit
  { re: -0.8,    im: 0.156 },   // sea horse
  { re: -0.7,    im: 0.27015 }, // dragon
  { re: 0.0,     im: 0.8 },     // thorn
  { re: -0.1,    im: 0.651 },   // star
  { re: -1.476,  im: 0.0 },     // airplane
];

let presetIdx = 0;
let presetT = 0;
let presetDur = 360; // frames per preset

const MAX_ITER = 128;
const ESCAPE = 4;

// Color: smooth iteration count → vibrant palette
function iterToRGB(iter, zMag2) {
  if (iter === MAX_ITER) return [0, 0, 0];
  // Smooth coloring: fractional escape
  const smooth = iter + 1 - Math.log(Math.log(Math.sqrt(zMag2))) / Math.LN2;
  const t = smooth / MAX_ITER;

  // Ultra-dark palette: deep blues/purples with orange highlights
  const t1 = t * 4;
  const seg = Math.floor(t1) % 4;
  const f = t1 - Math.floor(t1);

  let r, g, b;
  if (seg === 0) {
    // Black → deep indigo
    r = f * 10 | 0;
    g = f * 5 | 0;
    b = f * 80 | 0;
  } else if (seg === 1) {
    // Indigo → electric blue
    r = 10 + f * 20 | 0;
    g = 5 + f * 60 | 0;
    b = 80 + f * 120 | 0;
  } else if (seg === 2) {
    // Blue → cyan/white
    r = 30 + f * 180 | 0;
    g = 65 + f * 150 | 0;
    b = 200 + f * 55 | 0;
  } else {
    // White → orange → black
    const f2 = f < 0.5 ? f * 2 : (1 - f) * 2;
    r = 255 - f2 * 20 | 0;
    g = 215 - f2 * 150 | 0;
    b = 255 - f2 * 240 | 0;
  }
  return [Math.max(0, Math.min(255, r)),
          Math.max(0, Math.min(255, g)),
          Math.max(0, Math.min(255, b))];
}

function render(cRe, cIm) {
  const scale = 3.0 / Math.min(W, H);
  const data = imgData.data;

  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      let zx = (px - W / 2) * scale;
      let zy = (py - H / 2) * scale;

      let iter = 0;
      while (iter < MAX_ITER) {
        const zx2 = zx * zx;
        const zy2 = zy * zy;
        if (zx2 + zy2 > ESCAPE) break;
        zy = 2 * zx * zy + cIm;
        zx = zx2 - zy2 + cRe;
        iter++;
      }

      const i = (py * W + px) * 4;
      const [r, g, b] = iterToRGB(iter, zx * zx + zy * zy);
      data[i] = r; data[i+1] = g; data[i+2] = b; data[i+3] = 255;
    }
  }

  ctx.putImageData(imgData, 0, 0);
}

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  imgData = ctx.createImageData(W, H);
  dirty = true;
}

let dirty = true;
let frame = 0;

function lerp(a, b, t) { return a + (b - a) * t; }
function smoothStep(t) { return t * t * (3 - 2 * t); }

function tick() {
  frame++;

  if (!locked && !mouseActive) {
    // Auto-orbit between presets
    presetT++;
    if (presetT >= presetDur) {
      presetT = 0;
      presetIdx = (presetIdx + 1) % PRESETS.length;
    }

    const from = PRESETS[presetIdx];
    const to = PRESETS[(presetIdx + 1) % PRESETS.length];
    const morphZone = presetDur * 0.35;
    const holdZone = presetDur * 0.65;

    let t;
    if (presetT < holdZone) {
      t = 0;
    } else {
      t = smoothStep((presetT - holdZone) / morphZone);
    }

    currentC.re = lerp(from.re, to.re, t);
    currentC.im = lerp(from.im, to.im, t);
    dirty = true;
  }

  if (dirty) {
    render(currentC.re, currentC.im);
    ui.textContent = `c = ${currentC.re >= 0 ? '+' : ''}${currentC.re.toFixed(4)} ${currentC.im >= 0 ? '+' : ''}${currentC.im.toFixed(4)}i`;
    dirty = false;
  }

  requestAnimationFrame(tick);
}

// Mouse interaction
canvas.addEventListener('mousemove', e => {
  if (locked) return;
  mouseActive = true;
  currentC.re = (e.clientX / W - 0.5) * 3;
  currentC.im = (e.clientY / H - 0.5) * 2;
  dirty = true;
});

canvas.addEventListener('mouseleave', () => {
  if (!locked) {
    mouseActive = false;
    dirty = true;
  }
});

canvas.addEventListener('click', e => {
  if (!locked) {
    locked = true;
    hint.textContent = 'locked · click to unlock';
    currentC.re = (e.clientX / W - 0.5) * 3;
    currentC.im = (e.clientY / H - 0.5) * 2;
  } else {
    locked = false;
    mouseActive = false;
    hint.textContent = 'move mouse to explore · click to lock';
  }
  dirty = true;
});

// Touch
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  currentC.re = (t.clientX / W - 0.5) * 3;
  currentC.im = (t.clientY / H - 0.5) * 2;
  dirty = true;
  mouseActive = true;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  mouseActive = false;
});

resize();
window.addEventListener('resize', resize);
tick();
</script>
</body>
</html>
