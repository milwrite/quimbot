<!DOCTYPE html>
<html lang="en">
<head>

<title>Quadratic Walk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060608;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#ui{position:fixed;bottom:16px;left:16px;right:16px;display:flex;align-items:flex-end;justify-content:space-between;pointer-events:none}
#info{color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.55);padding:6px 12px;border-radius:6px;font:12px/1.5 ui-monospace,monospace;backdrop-filter:blur(6px)}
#hint{color:rgba(255,255,255,0.4);font:11px ui-monospace,monospace;text-align:right}
.back-btn{position:fixed;top:16px;right:16px;background:rgba(20,20,20,0.8);border:1px solid #444;color:#e0e0e0;padding:8px 14px;border-radius:6px;font:12px ui-monospace,monospace;cursor:pointer;text-decoration:none;backdrop-filter:blur(8px);z-index:1000;transition:border-color 0.2s}
.back-btn:hover{border-color:#888}
</style>
</head>
<body>
<a href="./" class="back-btn">← Gallery</a>
<canvas id="c"></canvas>
<div id="ui">
  <div id="info">q = 1/3 &nbsp;|&nbsp; 6 steps</div>
  <div id="hint">tap to cycle</div>
</div>
<script>
// Quadratic angle walk: at step n, move 1 unit then rotate by (p/q)·π·n² radians
// Inspired by: "Chaotic symmetry with angle paths" — r/creativecoding

const c = document.getElementById('c');
const ctx = c.getContext('2d');
const info = document.getElementById('info');
const hint = document.getElementById('hint');

// hide chrome when embedded in an iframe
const isIframe = window.self !== window.top;
if (isIframe) {
  document.querySelector('.back-btn').style.display = 'none';
  document.getElementById('ui').style.display = 'none';
}

let W, H;
function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
resize();
addEventListener('resize', () => { resize(); scheduleRender(); });

// q values: [numerator, denominator] — each produces a distinct symmetric figure
const qList = [
  [1,3],[1,4],[1,6],[1,12],
  [2,5],[3,7],[5,9],[4,7],
  [1,8],[3,8],[7,12],[5,12],
  [2,9],[7,10],[3,10],[11,12],
  [5,6],[7,8],[3,4],[5,8],
];
let qIdx = 0;

function computePath(p, q) {
  // path closes after 2*q steps (by quadratic Gauss sum symmetry)
  const N = 2 * q;
  const pts = new Float64Array(2 * (N + 1));
  let x = 0, y = 0, angle = 0;
  for (let n = 0; n <= N; n++) {
    pts[n * 2] = x;
    pts[n * 2 + 1] = y;
    // rotate by (p/q)·π·n²  (angle accumulates)
    angle += (p / q) * Math.PI * (n * n);
    x += Math.cos(angle);
    y += Math.sin(angle);
  }
  return { pts, N };
}

function fitPath(pts, N, cx, cy, maxR) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (let i = 0; i <= N; i++) {
    const x = pts[i * 2], y = pts[i * 2 + 1];
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
  }
  const w = maxX - minX || 1, h = maxY - minY || 1;
  const scale = maxR / (Math.max(w, h) * 0.5);
  const ox = cx - (minX + w / 2) * scale;
  const oy = cy - (minY + h / 2) * scale;
  return { scale, ox, oy };
}

// --- animation state ---
let animId = null;
let progress = 0;       // 0..1 draw progress
let targetProgress = 0;
let currentQ = qList[0];
let pathData = null;
let fit = null;
let transitionAlpha = 0; // 0=visible, fading out then fading new
let phase = 'draw';      // 'draw' | 'hold' | 'fade'
let holdTimer = 0;

function buildPath() {
  const [p, q] = currentQ;
  pathData = computePath(p, q);
  fit = fitPath(pathData.pts, pathData.N, W / 2, H / 2, Math.min(W, H) * 0.42);
}

buildPath();

function hue(t) {
  // t in [0,1] → vivid hue cycle
  return (t * 360 + 200) % 360;
}

function drawPath(alpha) {
  if (!pathData) return;
  const { pts, N } = pathData;
  const { scale, ox, oy } = fit;
  const steps = Math.floor(progress * N);

  ctx.globalAlpha = alpha;
  ctx.lineWidth = Math.max(1.2, Math.min(W, H) * 0.0028);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // draw in segments for gradient coloring
  const segLen = Math.max(1, Math.floor(N / 360));
  for (let i = 0; i < steps; i++) {
    const t = i / N;
    const nx = pts[i * 2] * scale + ox;
    const ny = pts[i * 2 + 1] * scale + oy;
    const nx2 = pts[(i + 1) * 2] * scale + ox;
    const ny2 = pts[(i + 1) * 2 + 1] * scale + oy;
    ctx.beginPath();
    ctx.moveTo(nx, ny);
    ctx.lineTo(nx2, ny2);
    ctx.strokeStyle = `hsl(${hue(t)},85%,62%)`;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// glow overlay on drawn path
function drawGlow(alpha) {
  if (!pathData) return;
  const { pts, N } = pathData;
  const { scale, ox, oy } = fit;
  const steps = Math.floor(progress * N);
  if (steps < 2) return;

  ctx.globalAlpha = alpha * 0.18;
  ctx.lineWidth = Math.max(3, Math.min(W, H) * 0.008);
  ctx.lineCap = 'round';
  ctx.filter = `blur(${Math.min(W, H) * 0.003}px)`;
  for (let i = 0; i < steps; i++) {
    const t = i / N;
    ctx.beginPath();
    ctx.moveTo(pts[i * 2] * scale + ox, pts[i * 2 + 1] * scale + oy);
    ctx.lineTo(pts[(i + 1) * 2] * scale + ox, pts[(i + 1) * 2 + 1] * scale + oy);
    ctx.strokeStyle = `hsl(${hue(t)},100%,75%)`;
    ctx.stroke();
  }
  ctx.filter = 'none';
  ctx.globalAlpha = 1;
}

function updateInfo() {
  const [p, q] = currentQ;
  const sym = q <= 6 ? q : (q % 2 === 0 ? q / 2 : q);
  info.textContent = `q = ${p}/${q}  |  ${2 * q} steps`;
}

let renderQueued = false;
function scheduleRender() {
  if (!renderQueued) { renderQueued = true; requestAnimationFrame(tick); }
}

let lastT = 0;
let drawSpeed = 0.6; // fraction per second

function tick(t) {
  renderQueued = false;
  const dt = Math.min((t - lastT) / 1000, 0.05);
  lastT = t;

  if (phase === 'draw') {
    progress = Math.min(1, progress + drawSpeed * dt);
    if (progress >= 1) {
      phase = 'hold';
      holdTimer = 2.2; // seconds to hold
    }
  } else if (phase === 'hold') {
    holdTimer -= dt;
    if (holdTimer <= 0) {
      phase = 'fade';
      transitionAlpha = 1;
    }
  } else if (phase === 'fade') {
    transitionAlpha -= dt * 1.8;
    if (transitionAlpha <= 0) {
      transitionAlpha = 0;
      advance();
      phase = 'draw';
      progress = 0;
    }
  }

  // background
  ctx.fillStyle = '#060608';
  ctx.fillRect(0, 0, W, H);

  // subtle radial center glow
  const cx = W / 2, cy = H / 2;
  const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * 0.5);
  rg.addColorStop(0, 'rgba(60,40,100,0.12)');
  rg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rg;
  ctx.fillRect(0, 0, W, H);

  const a = phase === 'fade' ? transitionAlpha : 1;
  drawGlow(a);
  drawPath(a);

  requestAnimationFrame(tick);
}

function advance() {
  qIdx = (qIdx + 1) % qList.length;
  currentQ = qList[qIdx];
  buildPath();
  updateInfo();
}

// click / tap to skip to next
addEventListener('pointerdown', () => {
  if (phase === 'draw' || phase === 'hold') {
    phase = 'fade';
    transitionAlpha = 1;
  }
});

updateInfo();
requestAnimationFrame(t => { lastT = t; tick(t); });
</script>
</body>
</html>
