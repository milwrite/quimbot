<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3QgZmlsbD0iIzBhMGEwYSIgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIi8+CiAgPHBhdGggZD0iTTggOCBMMjQgOCBMMjQgMjQgTDggMjQgWiBNMTIgMTIgTDIwIDEyIEwyMCAyMCBMMTIgMjAgWiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZTBlMGUwIiBzdHJva2Utd2lkdGg9IjEuNSIvPgo8L3N2Zz4K"/>
<title>Spring Wires</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#060810;overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none}
#info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.55);padding:6px 14px;border-radius:6px;font:12px/1.4 ui-monospace,monospace;pointer-events:none;text-align:center;max-width:min(92vw,620px)}
.back-btn{position:fixed;top:16px;right:16px;background:rgba(20,20,20,0.8);border:1px solid #444;color:#e0e0e0;padding:8px 14px;border-radius:6px;font:12px ui-monospace,monospace;cursor:pointer;text-decoration:none;backdrop-filter:blur(8px);z-index:1000;transition:border-color 0.2s}
.back-btn:hover{border-color:#888}
</style>
</head>
<body>
<a href="./" class="back-btn">← Gallery</a>
<canvas id="c"></canvas>
<div id="info">Spring Wires · drag nodes · double-click canvas to add · click node to pin/unpin</div>
<script>
// Hide UI when inside iframe
if(window.self!==window.top){
  document.querySelectorAll('.back-btn,#info').forEach(e=>e.style.display='none');
}

const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,DPR=1;

// Verlet integration physics
const DAMPING=0.985, GRAVITY=0.08, SPRING_REST=110, SPRING_K=0.04;
const NODE_RADIUS=8;
const IS_TOUCH=window.matchMedia('(pointer:coarse)').matches;
const SPRING_ITERS=IS_TOUCH?3:5;

let nodes=[], edges=[], dragging=null, dragOffX=0, dragOffY=0;
let mouseX=0, mouseY=0;

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,IS_TOUCH?1.5:2);
  W=window.innerWidth;
  H=window.innerHeight;
  canvas.width=Math.round(W*DPR);
  canvas.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}

function makeGrid(){
  nodes=[];edges=[];
  const spacingX=IS_TOUCH?160:130, spacingY=IS_TOUCH?145:120;
  const cols=Math.max(2,Math.floor(W/(IS_TOUCH?170:140))), rows=Math.max(2,Math.floor(H/(IS_TOUCH?160:130)));
  const padX=(W-(cols-1)*spacingX)/2, padY=(H-(rows-1)*spacingY)/2;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const jx=(Math.random()-0.5)*20, jy=(Math.random()-0.5)*20;
      nodes.push({
        x:padX+c*spacingX+jx, y:padY+r*spacingY+jy,
        px:padX+c*spacingX+jx, py:padY+r*spacingY+jy, // prev position
        pinned: r===0, // top row pinned
        hue: (c/cols)*300
      });
    }
  }
  // Connect neighbours
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const i=r*cols+c;
      if(c<cols-1) edges.push([i,i+1]);
      if(r<rows-1) edges.push([i,i+cols]);
      // diagonals for shear resistance
      if(c<cols-1&&r<rows-1){ edges.push([i,i+cols+1]); edges.push([i+1,i+cols]); }
    }
  }
}

resize();
makeGrid();
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{resize();makeGrid();},120);
});
window.addEventListener('orientationchange',()=>setTimeout(()=>{resize();makeGrid();},200));

// Physics step
function step(){
  // Verlet integrate
  for(const n of nodes){
    if(n.pinned) continue;
    const vx=(n.x-n.px)*DAMPING;
    const vy=(n.y-n.py)*DAMPING;
    n.px=n.x; n.py=n.y;
    n.x+=vx;
    n.y+=vy+GRAVITY;
    // boundary bounce
    if(n.y>H-5){n.y=H-5;n.py=n.y+vy*0.3;}
    if(n.x<5){n.x=5;n.px=n.x+vx*0.3;}
    if(n.x>W-5){n.x=W-5;n.px=n.x+vx*0.3;}
  }
  // Spring constraints (multiple iterations)
  for(let iter=0;iter<SPRING_ITERS;iter++){ 
    for(const [ai,bi] of edges){
      const a=nodes[ai], b=nodes[bi];
      const dx=b.x-a.x, dy=b.y-a.y;
      const dist=Math.sqrt(dx*dx+dy*dy)||0.001;
      const delta=(dist-SPRING_REST)*SPRING_K;
      const fx=dx/dist*delta, fy=dy/dist*delta;
      if(!a.pinned){a.x+=fx;a.y+=fy;}
      if(!b.pinned){b.x-=fx;b.y-=fy;}
    }
  }
  // drag node
  if(dragging!==null){
    const n=nodes[dragging];
    n.x=mouseX+dragOffX;
    n.y=mouseY+dragOffY;
    n.px=n.x;
    n.py=n.y;
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // Draw edges as glowing wires
  for(const [ai,bi] of edges){
    const a=nodes[ai], b=nodes[bi];
    const dx=b.x-a.x, dy=b.y-a.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const stretch=Math.max(0,dist/SPRING_REST-1); // 0=rest, >0=stretched
    const hue=((a.hue+b.hue)/2+performance.now()*0.02)%360;
    const alpha=Math.max(0.15, 0.7-stretch*1.5);
    const lw=Math.max(0.5, 1.8-stretch*2);

    // Outer glow
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=`hsla(${hue},80%,60%,${alpha*0.3})`;
    ctx.lineWidth=lw*4;
    ctx.stroke();
    // Core wire
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=`hsla(${hue},85%,70%,${alpha})`;
    ctx.lineWidth=lw;
    ctx.stroke();
  }

  // Draw nodes
  for(let i=0;i<nodes.length;i++){
    const n=nodes[i];
    const hue=(n.hue+performance.now()*0.02)%360;
    ctx.beginPath();
    ctx.arc(n.x,n.y,NODE_RADIUS,0,Math.PI*2);
    if(n.pinned){
      ctx.fillStyle=`hsla(${hue},60%,90%,0.95)`;
    } else {
      ctx.fillStyle=`hsla(${hue},80%,65%,0.9)`;
    }
    ctx.shadowColor=`hsla(${hue},90%,60%,0.7)`;
    ctx.shadowBlur=12;
    ctx.fill();
    ctx.shadowBlur=0;
    // pin indicator
    if(n.pinned){
      ctx.beginPath();
      ctx.arc(n.x,n.y,4,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.fill();
    }
  }
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}
loop();

// --- Interaction ---
function nodeAt(x,y){
  for(let i=0;i<nodes.length;i++){
    const n=nodes[i];
    const d=Math.hypot(n.x-x,n.y-y);
    if(d<NODE_RADIUS*2) return i;
  }
  return -1;
}

canvas.addEventListener('mousedown',e=>{
  mouseX=e.clientX; mouseY=e.clientY;
  const idx=nodeAt(e.clientX,e.clientY);
  if(idx>=0){
    dragging=idx;
    dragOffX=nodes[idx].x-e.clientX;
    dragOffY=nodes[idx].y-e.clientY;
  }
});
canvas.addEventListener('mousemove',e=>{
  mouseX=e.clientX; mouseY=e.clientY;
});
canvas.addEventListener('mouseup',()=>{ dragging=null; });
canvas.addEventListener('click',e=>{
  const idx=nodeAt(e.clientX,e.clientY);
  if(idx>=0) nodes[idx].pinned=!nodes[idx].pinned;
});
canvas.addEventListener('dblclick',e=>{
  // Add a new node at click, connect to nearest
  const nx=e.clientX, ny=e.clientY;
  const newIdx=nodes.length;
  nodes.push({x:nx,y:ny,px:nx+Math.random()*2-1,py:ny-5,pinned:false,hue:Math.random()*360});
  // Connect to 3 nearest
  const dists=nodes.slice(0,-1).map((n,i)=>({i,d:Math.hypot(n.x-nx,n.y-ny)}));
  dists.sort((a,b)=>a.d-b.d);
  for(let k=0;k<Math.min(3,dists.length);k++) edges.push([newIdx,dists[k].i]);
  e.preventDefault();
});

// Touch support
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  mouseX=t.clientX; mouseY=t.clientY;
  const idx=nodeAt(t.clientX,t.clientY);
  if(idx>=0){ dragging=idx; dragOffX=nodes[idx].x-t.clientX; dragOffY=nodes[idx].y-t.clientY; }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  mouseX=t.clientX; mouseY=t.clientY;
},{passive:false});
let lastTapAt=0;
canvas.addEventListener('touchend',e=>{
  dragging=null;
  const now=performance.now();
  if(now-lastTapAt<280){
    const t=(e.changedTouches&&e.changedTouches[0])||null;
    if(t){
      const nx=t.clientX, ny=t.clientY;
      const newIdx=nodes.length;
      nodes.push({x:nx,y:ny,px:nx+Math.random()*2-1,py:ny-5,pinned:false,hue:Math.random()*360});
      const dists=nodes.slice(0,-1).map((n,i)=>({i,d:Math.hypot(n.x-nx,n.y-ny)}));
      dists.sort((a,b)=>a.d-b.d);
      for(let k=0;k<Math.min(3,dists.length);k++) edges.push([newIdx,dists[k].i]);
    }
  }
  lastTapAt=now;
});
</script>
</body>
</html>
