<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3QgZmlsbD0iIzBhMGEwYSIgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIi8+CiAgPHBhdGggZD0iTTggOCBMMjQgOCBMMjQgMjQgTDggMjQgWiBNMTIgMTIgTDIwIDEyIEwyMCAyMCBMMTIgMjAgWiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZTBlMGUwIiBzdHJva2Utd2lkdGg9IjEuNSIvPgo8L3N2Zz4K"/>
<title>Mondrian Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0a0a0a;overflow:hidden;display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated;touch-action:manipulation}
#info{position:fixed;bottom:max(16px,env(safe-area-inset-bottom,16px));left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.75);background:rgba(0,0,0,0.55);padding:6px 14px;border-radius:6px;font:12px/1.5 ui-monospace,monospace;pointer-events:none;text-align:center;white-space:nowrap}
.back-btn{position:fixed;top:max(16px,env(safe-area-inset-top,16px));right:max(16px,env(safe-area-inset-right,16px));background:rgba(20,20,20,0.8);border:1px solid #444;color:#e0e0e0;padding:8px 14px;border-radius:6px;font:12px ui-monospace,monospace;cursor:pointer;text-decoration:none;backdrop-filter:blur(8px);z-index:1000;min-height:44px;display:flex;align-items:center;transition:border-color 0.2s}
.back-btn:hover{border-color:#888}
</style>
</head>
<body>
<a href="./" class="back-btn">← Gallery</a>
<canvas id="c"></canvas>
<div id="info">Mondrian generator · recursive subdivision · tap to regenerate</div>
<script>
(function(){
'use strict';
const c=document.getElementById('c'),ctx=c.getContext('2d');

// hide UI when in iframe
if(window.self!==window.top){
  document.querySelector('.back-btn').style.display='none';
  document.getElementById('info').style.display='none';
}

const PAD=Math.min(40,Math.min(innerWidth,innerHeight)*0.05); // responsive outer border
const LINE=8;     // grid line width
const MIN=80;     // minimum cell size

// Mondrian palette: primaries + black + off-white
const PALETTE=[
  '#D62B2B', // red
  '#F2C500', // yellow
  '#1B4FBB', // blue
  '#F5F0E0', // off-white
  '#F5F0E0',
  '#F5F0E0',
  '#F5F0E0',
  '#F5F0E0',
  '#101010', // black
  '#101010',
];

let W,H,GRID;

function resize(){
  W=innerWidth;H=innerHeight;
  const s=Math.min(W,H)-PAD*2;
  GRID=s;
  c.width=W;c.height=H;
}
resize();
addEventListener('resize',()=>{resize();generate()});

// seeded prng for reproducibility per generation
let seed=0;
function rng(){
  seed=(seed*1664525+1013904223)>>>0;
  return seed/4294967296;
}

// a cell: {x,y,w,h} in grid coords
function split(cells,depth){
  if(depth<=0)return cells;
  const next=[];
  for(const cell of cells){
    // decide to split or keep
    const splitH=cell.w>MIN*2&&rng()<0.55;
    const splitV=cell.h>MIN*2&&rng()<0.55;
    if(splitH&&splitV){
      const cut=Math.floor(MIN+rng()*(cell.w-MIN*2));
      const cutV=Math.floor(MIN+rng()*(cell.h-MIN*2));
      // four children
      next.push(...split([
        {x:cell.x,y:cell.y,w:cut,h:cutV},
        {x:cell.x+cut,y:cell.y,w:cell.w-cut,h:cutV},
        {x:cell.x,y:cell.y+cutV,w:cut,h:cell.h-cutV},
        {x:cell.x+cut,y:cell.y+cutV,w:cell.w-cut,h:cell.h-cutV},
      ],depth-1));
    } else if(splitH){
      const cut=Math.floor(MIN+rng()*(cell.w-MIN*2));
      next.push(...split([
        {x:cell.x,y:cell.y,w:cut,h:cell.h},
        {x:cell.x+cut,y:cell.y,w:cell.w-cut,h:cell.h},
      ],depth-1));
    } else if(splitV){
      const cut=Math.floor(MIN+rng()*(cell.h-MIN*2));
      next.push(...split([
        {x:cell.x,y:cell.y,w:cell.w,h:cut},
        {x:cell.x,y:cell.y+cut,w:cell.w,h:cell.h-cut},
      ],depth-1));
    } else {
      next.push(cell);
    }
  }
  return next;
}

// animated fill state
let cells=[];
let fills=[];      // current displayed fills
let targets=[];    // target fills after regen
let animT=0;       // 0..1
let animating=false;
const ANIM_DUR=800; // ms

function generate(){
  seed=Date.now()|0;
  const initial=[{x:0,y:0,w:GRID,h:GRID}];
  cells=split(initial,6);

  // assign colors — ensure at least some primaries
  const newTargets=cells.map((_,i)=>{
    return PALETTE[Math.floor(rng()*PALETTE.length)];
  });
  // guarantee at least one of each primary
  const primaries=['#D62B2B','#F2C500','#1B4FBB'];
  if(cells.length>=3){
    for(let p=0;p<primaries.length;p++){
      let found=newTargets.indexOf(primaries[p]);
      if(found<0){
        const idx=Math.floor(rng()*cells.length);
        newTargets[idx]=primaries[p];
      }
    }
  }

  if(fills.length===0){
    fills=[...newTargets];
    targets=[...newTargets];
    animT=1;
    draw(1);
    return;
  }

  // cross-fade: store old fills, set targets
  targets=newTargets;
  animT=0;
  animating=true;
}

function hexToRgb(h){
  const r=parseInt(h.slice(1,3),16);
  const g=parseInt(h.slice(3,5),16);
  const b=parseInt(h.slice(5,7),16);
  return[r,g,b];
}

function lerpColor(a,b,t){
  const [r1,g1,b1]=hexToRgb(a);
  const [r2,g2,b2]=hexToRgb(b);
  const r=Math.round(r1+(r2-r1)*t);
  const g=Math.round(g1+(g2-g1)*t);
  const bl=Math.round(b1+(b2-b1)*t);
  return`rgb(${r},${g},${bl})`;
}

function draw(t){
  ctx.clearRect(0,0,W,H);
  const ox=(W-GRID)/2;
  const oy=(H-GRID)/2;

  // background
  ctx.fillStyle='#101010';
  ctx.fillRect(0,0,W,H);

  // outer border rect
  ctx.fillStyle='#F5F0E0';
  ctx.fillRect(ox-LINE,oy-LINE,GRID+LINE*2,GRID+LINE*2);

  for(let i=0;i<cells.length;i++){
    const cell=cells[i];
    const oldFill=fills[i]||'#F5F0E0';
    const newFill=targets[i]||'#F5F0E0';
    const color=t>=1?newFill:lerpColor(oldFill,newFill,t);
    ctx.fillStyle=color;
    ctx.fillRect(ox+cell.x+LINE/2,oy+cell.y+LINE/2,cell.w-LINE,cell.h-LINE);
  }

  // grid lines (drawn over fills)
  ctx.strokeStyle='#101010';
  ctx.lineWidth=LINE;
  ctx.lineCap='square';
  // draw all cell borders
  for(const cell of cells){
    ctx.strokeRect(ox+cell.x+LINE/2,oy+cell.y+LINE/2,cell.w-LINE,cell.h-LINE);
  }
}

let lastTime=0;
function loop(ts){
  if(animating){
    const dt=ts-lastTime;
    animT=Math.min(1,animT+dt/ANIM_DUR);
    draw(easeInOut(animT));
    if(animT>=1){
      fills=[...targets];
      animating=false;
    }
  }
  lastTime=ts;
  requestAnimationFrame(loop);
}

function easeInOut(t){
  return t<0.5?2*t*t:(1-Math.pow(-2*t+2,2)/2);
}

addEventListener('click',generate);
addEventListener('keydown',e=>{if(e.key===' ')generate()});

generate();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
