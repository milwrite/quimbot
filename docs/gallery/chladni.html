<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chladni Figures</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #08080a; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #label {
    position: fixed; top: 16px; left: 16px;
    color: rgba(255,255,255,0.45); font: 12px/1.4 ui-monospace, monospace;
    pointer-events: none; letter-spacing: 0.06em;
  }
  #hint {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.28); font: 12px ui-monospace, monospace;
    pointer-events: none; white-space: nowrap;
  }
  .back-btn {
    position: fixed; top: 16px; right: 16px;
    background: rgba(20,20,20,0.8); border: 1px solid #444; color: #e0e0e0;
    padding: 8px 14px; border-radius: 6px; font: 12px ui-monospace, monospace;
    cursor: pointer; text-decoration: none; backdrop-filter: blur(8px);
    z-index: 100; transition: border-color 0.2s;
  }
  .back-btn:hover { border-color: #888; }
  .in-iframe .back-btn, .in-iframe #label, .in-iframe #hint { display: none; }
</style>
</head>
<body>
<script>if (window.self !== window.top) document.body.classList.add('in-iframe');</script>
<a href="./" class="back-btn">← Gallery</a>
<div id="label">Chladni Figures</div>
<div id="hint">click / tap to advance mode</div>
<canvas id="c"></canvas>

<script>
'use strict';

// Mode pairs (m, n) — interesting Chladni resonances
const MODES = [
  [1,2],[2,3],[1,3],[3,4],[2,5],[3,5],
  [1,4],[4,5],[2,4],[3,6],[1,5],[4,6]
];

let modeIdx = 0;
let prevM, prevN, nextM, nextN;
let t = 1; // 0→1 transition progress (start complete so first mode renders immediately)
const DURATION = 2800; // ms per morph
let lastTime = null;

const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
let W, H, dpr;
let offscreen, offCtx, RES; // internal render resolution

// Sand palette — warm whites to amber, concentrated at nodal lines
const SAND_R = 210, SAND_G = 185, SAND_B = 140;
const BG_R   = 8,   BG_G   = 8,   BG_B   = 10;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width  = W * dpr; canvas.height = H * dpr;
  canvas.style.width  = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Offscreen buffer at reduced resolution for speed
  RES = Math.min(Math.max(Math.floor(Math.min(W, H) * 0.8), 300), 520);
  offscreen = new OffscreenCanvas(RES, RES);
  offCtx    = offscreen.getContext('2d');
}

// Chladni field: f(x,y) = cos(m·π·x)·cos(n·π·y) − cos(n·π·x)·cos(m·π·y)
// x, y ∈ [−1, 1]. Nodes (sand) where |f| < band.
function renderChladni(m, n) {
  const img  = offCtx.createImageData(RES, RES);
  const data = img.data;
  const PI   = Math.PI;
  const band = 0.12;          // nodal line width
  const falloff = 1 / band;

  for (let py = 0; py < RES; py++) {
    const y = (py / (RES - 1)) * 2 - 1;
    const cosny = Math.cos(n * PI * y);
    const cosmy = Math.cos(m * PI * y);
    for (let px = 0; px < RES; px++) {
      const x  = (px / (RES - 1)) * 2 - 1;
      const f  = Math.cos(m * PI * x) * cosny - Math.cos(n * PI * x) * cosmy;
      const af = Math.abs(f);
      const i  = (py * RES + px) * 4;

      if (af < band) {
        // Smooth intensity: 1 at f=0, fading to 0 at edges of band
        const s = 1 - af * falloff;
        const s2 = s * s; // sharper concentrate
        data[i]   = BG_R + (SAND_R - BG_R) * s2;
        data[i+1] = BG_G + (SAND_G - BG_G) * s2;
        data[i+2] = BG_B + (SAND_B - BG_B) * s2;
      } else {
        data[i]   = BG_R;
        data[i+1] = BG_G;
        data[i+2] = BG_B;
      }
      data[i+3] = 255;
    }
  }
  offCtx.putImageData(img, 0, 0);
}

function advance() {
  prevM = nextM ?? MODES[0][0];
  prevN = nextN ?? MODES[0][1];
  modeIdx = (modeIdx + 1) % MODES.length;
  [nextM, nextN] = MODES[modeIdx];
  t = 0;
}

function frame(ts) {
  if (!lastTime) lastTime = ts;
  const dt = ts - lastTime;
  lastTime = ts;

  if (t < 1) {
    t = Math.min(t + dt / DURATION, 1);
    // Ease in-out cubic
    const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    const m = prevM + (nextM - prevM) * e;
    const n = prevN + (nextN - prevN) * e;
    renderChladni(m, n);
  }

  // Draw offscreen buffer centered and square
  const side = Math.min(W, H) * 0.92;
  const ox   = (W - side) / 2;
  const oy   = (H - side) / 2;
  ctx.fillStyle = `rgb(${BG_R},${BG_G},${BG_B})`;
  ctx.fillRect(0, 0, W, H);
  ctx.drawImage(offscreen, ox, oy, side, side);

  requestAnimationFrame(frame);
}

// Init
function init() {
  modeIdx = MODES.length - 1; // so advance() lands on index 0
  advance();
  // Render first mode immediately (no morph)
  prevM = nextM; prevN = nextN; t = 1;
  renderChladni(nextM, nextN);
  requestAnimationFrame(frame);

  // Auto-advance every 4 s
  setInterval(advance, 4000);
}

// Events
window.addEventListener('resize', resize);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', resize);
}
canvas.addEventListener('click',     advance);
canvas.addEventListener('touchstart', e => { e.preventDefault(); advance(); }, { passive: false });

resize();
init();
</script>
</body>
</html>
