<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chladni Figures</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; touch-action: none; }
  canvas { display: block; }
  .ui {
    position: fixed; bottom: 1rem; left: 1rem;
    font: 0.75rem/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #aaa; background: rgba(10,10,10,0.85);
    padding: 0.5rem 0.8rem; border-radius: 4px;
    pointer-events: none;
  }
  .back {
    position: fixed; top: 1rem; left: 1rem;
    font: 0.8rem/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #aaa; background: rgba(10,10,10,0.85);
    padding: 0.5rem 0.8rem; border-radius: 4px;
    text-decoration: none; border: 1px solid #333;
    transition: border-color 0.2s;
    z-index: 10;
  }
  .back:hover { border-color: #666; color: #fff; }
  .in-iframe .back, .in-iframe .ui { display: none; }
</style>
</head>
<body>
<a class="back" href="index.html">← gallery</a>
<canvas id="c"></canvas>
<div class="ui" id="ui"></div>
<script>
if (window.self !== window.top) document.body.classList.add('in-iframe');

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');

// Mode pairs to cycle through — beautiful Chladni patterns
const MODES = [
  [2, 3], [3, 4], [4, 5], [5, 6], [3, 5], [4, 7],
  [5, 8], [2, 5], [3, 7], [6, 7], [4, 9], [5, 7]
];

let W, H, res;
let imgData;
let modeIdx = 0;
let targetM, targetN, curM, curN;
let phase = 0;
let morphT = 1; // 0..1, blend to next mode
let morphDur = 90; // frames to morph
let holdDur = 200; // frames to hold
let frameCount = 0;
let holdCounter = 0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  res = Math.min(W, H);
  imgData = ctx.createImageData(W, H);
}

function chladniZ(x, y, m, n) {
  // Normalized plate coords [0,1]
  const px = x / res;
  const py = y / res;
  return Math.cos(m * Math.PI * px) * Math.cos(n * Math.PI * py)
       - Math.cos(n * Math.PI * px) * Math.cos(m * Math.PI * py);
}

// Smooth hermite interpolation
function hermite(t) { return t * t * (3 - 2 * t); }

function renderFrame(m, n) {
  const ox = (W - res) / 2;
  const oy = (H - res) / 2;
  const data = imgData.data;

  // Threshold for nodal "sand" region
  const threshold = 0.04 + 0.02 * Math.sin(phase * 0.03);

  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      const i = (py * W + px) * 4;
      const lx = px - ox;
      const ly = py - oy;

      // Outside plate
      if (lx < 0 || lx > res || ly < 0 || ly > res) {
        data[i] = 10; data[i+1] = 10; data[i+2] = 10; data[i+3] = 255;
        continue;
      }

      const z = Math.abs(chladniZ(lx, ly, m, n));

      let r, g, b;
      if (z < threshold) {
        // Sand/dust on nodal lines — warm cream color
        const intensity = 1 - (z / threshold);
        const bright = Math.pow(intensity, 0.5);
        r = 220 + 35 * bright | 0;
        g = 195 + 25 * bright | 0;
        b = 140 + 20 * bright | 0;
      } else {
        // Plate vibration displacement — subtle amber glow proportional to |z|
        const v = Math.min(z, 1);
        const glow = Math.pow(1 - v, 3) * 0.4;
        r = 20 + 60 * glow | 0;
        g = 15 + 35 * glow | 0;
        b = 10 + 10 * glow | 0;
      }

      data[i] = r; data[i+1] = g; data[i+2] = b; data[i+3] = 255;
    }
  }

  ctx.putImageData(imgData, 0, 0);

  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.strokeRect(ox, oy, res, res);
}

function renderBlend(m1, n1, m2, n2, t) {
  const ox = (W - res) / 2;
  const oy = (H - res) / 2;
  const data = imgData.data;
  const threshold = 0.04;

  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      const i = (py * W + px) * 4;
      const lx = px - ox;
      const ly = py - oy;

      if (lx < 0 || lx > res || ly < 0 || ly > res) {
        data[i] = 10; data[i+1] = 10; data[i+2] = 10; data[i+3] = 255;
        continue;
      }

      const z1 = Math.abs(chladniZ(lx, ly, m1, n1));
      const z2 = Math.abs(chladniZ(lx, ly, m2, n2));
      const z = z1 * (1 - t) + z2 * t;

      let r, g, b;
      if (z < threshold) {
        const bright = Math.pow(1 - z / threshold, 0.5);
        r = 220 + 35 * bright | 0;
        g = 195 + 25 * bright | 0;
        b = 140 + 20 * bright | 0;
      } else {
        const v = Math.min(z, 1);
        const glow = Math.pow(1 - v, 3) * 0.4;
        r = 20 + 60 * glow | 0;
        g = 15 + 35 * glow | 0;
        b = 10 + 10 * glow | 0;
      }

      data[i] = r; data[i+1] = g; data[i+2] = b; data[i+3] = 255;
    }
  }

  ctx.putImageData(imgData, 0, 0);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.strokeRect(ox, oy, res, res);
}

let prevMode = MODES[0];
let nextMode = MODES[1];
let state = 'hold'; // 'hold' | 'morph'
let stateCounter = 0;

function tick() {
  phase++;

  if (state === 'hold') {
    renderFrame(prevMode[0], prevMode[1]);
    stateCounter++;
    if (stateCounter >= holdDur) {
      stateCounter = 0;
      state = 'morph';
      modeIdx = (modeIdx + 1) % MODES.length;
      nextMode = MODES[modeIdx];
    }
  } else {
    const t = hermite(Math.min(stateCounter / morphDur, 1));
    renderBlend(prevMode[0], prevMode[1], nextMode[0], nextMode[1], t);
    stateCounter++;
    if (stateCounter >= morphDur) {
      stateCounter = 0;
      state = 'hold';
      prevMode = nextMode;
    }
  }

  // Update label
  const [m, n] = prevMode;
  ui.textContent = state === 'hold'
    ? `mode (${m}, ${n}) — click to advance`
    : `morphing → (${nextMode[0]}, ${nextMode[1]})`;

  requestAnimationFrame(tick);
}

// Click to advance to next mode
canvas.addEventListener('click', () => {
  if (state === 'hold') {
    stateCounter = holdDur; // trigger morph immediately
  }
});

resize();
window.addEventListener('resize', resize);
tick();
</script>
</body>
</html>
