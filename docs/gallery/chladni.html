<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chladni Figures</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #08080a; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
  #label {
    position: fixed; top: calc(12px + env(safe-area-inset-top)); left: calc(12px + env(safe-area-inset-left));
    color: rgba(255,255,255,0.4); font: 12px/1.4 ui-monospace, monospace;
    pointer-events: none; letter-spacing: 0.07em;
  }
  #mode-label {
    position: fixed; top: calc(28px + env(safe-area-inset-top)); left: calc(12px + env(safe-area-inset-left));
    color: rgba(255,255,255,0.2); font: 11px ui-monospace, monospace;
    pointer-events: none;
  }
  #hint {
    position: fixed; bottom: calc(12px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.2); font: 11px ui-monospace, monospace;
    pointer-events: none; white-space: nowrap;
  }
  .back-btn {
    position: fixed; top: calc(12px + env(safe-area-inset-top)); right: calc(12px + env(safe-area-inset-right));
    background: rgba(20,20,20,0.8); border: 1px solid #444; color: #e0e0e0;
    padding: 8px 14px; border-radius: 6px; font: 12px ui-monospace, monospace;
    cursor: pointer; text-decoration: none; backdrop-filter: blur(8px);
    z-index: 100; transition: border-color 0.2s;
  }
  .back-btn:hover { border-color: #888; }
  .in-iframe .back-btn, .in-iframe #label,
  .in-iframe #mode-label, .in-iframe #hint { display: none; }
</style>
</head>
<body>
<script>if (window.self !== window.top) document.body.classList.add('in-iframe');</script>
<a href="./" class="back-btn">← Gallery</a>
<div id="label">Chladni Figures</div>
<div id="mode-label">m=1 n=2</div>
<div id="hint">click · tap to advance</div>
<canvas id="c"></canvas>
<script>
'use strict';

const MODES = [
  [1,2],[2,3],[1,3],[3,4],[2,5],[3,5],
  [1,4],[4,5],[2,4],[3,6],[1,5],[4,6]
];
const DURATION = 2600; // ms per morph

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const modeEl = document.getElementById('mode-label');

let W, H, dpr;
let modeIdx = 0;
let prevM = MODES[MODES.length - 1][0], prevN = MODES[MODES.length - 1][1];
let nextM = MODES[0][0], nextN = MODES[0][1];
let t = 0;          // begin morphing immediately on load
let lastTime = null;
let autoTimer = null;

// Sand-on-dark palette
const SR = 210, SG = 182, SB = 132;
const BR = 8,   BG = 8,   BB = 10;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
}

// Chladni field: f(x,y) = cos(mπx)cos(nπy) − cos(nπx)cos(mπy)
// Nodal lines (sand) where |f| < band; render directly into a side×side ImageData.
function renderFrame(m, n) {
  const cW   = canvas.width, cH = canvas.height;
  const side = Math.floor(Math.min(cW, cH) * 0.90);
  const ox   = Math.floor((cW - side) / 2);
  const oy   = Math.floor((cH - side) / 2);
  const PI   = Math.PI;
  const band = 0.115, inv = 1 / band;

  const id  = ctx.createImageData(side, side);
  const buf = id.data;

  for (let py = 0; py < side; py++) {
    const y   = (py / (side - 1)) * 2 - 1;
    const cny = Math.cos(n * PI * y);
    const cmy = Math.cos(m * PI * y);
    for (let px = 0; px < side; px++) {
      const x  = (px / (side - 1)) * 2 - 1;
      const f  = Math.cos(m * PI * x) * cny - Math.cos(n * PI * x) * cmy;
      const af = Math.abs(f);
      const i  = (py * side + px) * 4;
      if (af < band) {
        const s = 1 - af * inv, s2 = s * s;
        buf[i]   = BR + (SR - BR) * s2;
        buf[i+1] = BG + (SG - BG) * s2;
        buf[i+2] = BB + (SB - BB) * s2;
      } else {
        buf[i] = BR; buf[i+1] = BG; buf[i+2] = BB;
      }
      buf[i+3] = 255;
    }
  }

  ctx.fillStyle = `rgb(${BR},${BG},${BB})`;
  ctx.fillRect(0, 0, cW, cH);
  ctx.putImageData(id, ox, oy);
}

function ease(x) {
  return x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2, 3) / 2;
}

function advance() {
  prevM = nextM; prevN = nextN;
  modeIdx = (modeIdx + 1) % MODES.length;
  nextM = MODES[modeIdx][0]; nextN = MODES[modeIdx][1];
  t = 0;
  modeEl.textContent = `m=${nextM} n=${nextN}`;
}

function resetAuto() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => { advance(); resetAuto(); }, DURATION + 900);
}

function tick(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 80);
  lastTime = ts;

  if (t < 1) {
    t = Math.min(t + dt / DURATION, 1);
    const e = ease(t);
    renderFrame(
      prevM + (nextM - prevM) * e,
      prevN + (nextN - prevN) * e
    );
  }

  requestAnimationFrame(tick);
}

// Events
window.addEventListener('resize', resize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

function handleTap() { advance(); resetAuto(); }
canvas.addEventListener('click', handleTap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleTap(); }, { passive: false });

// Init — animation starts immediately
resize();
modeEl.textContent = `m=${nextM} n=${nextN}`;
resetAuto();
requestAnimationFrame(tick);
</script>
</body>
</html>
