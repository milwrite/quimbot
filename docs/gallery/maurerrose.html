<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3QgZmlsbD0iIzBhMGEwYSIgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIi8+CiAgPHBhdGggZD0iTTggOCBMMjQgOCBMMjQgMjQgTDggMjQgWiBNMTIgMTIgTDIwIDEyIEwyMCAyMCBMMTIgMjAgWiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZTBlMGUwIiBzdHJva2Utd2lkdGg9IjEuNSIvPgo8L3N2Zz4K"/>
<title>Maurer Rose</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#06060a;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#info{position:fixed;bottom:16px;left:16px;color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.55);padding:6px 12px;border-radius:6px;font:12px/1.5 ui-monospace,monospace;backdrop-filter:blur(6px);pointer-events:none}
.back-btn{position:fixed;top:16px;right:16px;background:rgba(20,20,20,0.8);border:1px solid #444;color:#e0e0e0;padding:8px 14px;border-radius:6px;font:12px ui-monospace,monospace;cursor:pointer;text-decoration:none;backdrop-filter:blur(8px);z-index:1000;transition:border-color 0.2s}
.back-btn:hover{border-color:#888}
</style>
</head>
<body>
<a href="./" class="back-btn">← Gallery</a>
<canvas id="c"></canvas>
<div id="info">n=2 d=29 | move mouse to explore</div>
<script>
// Maurer Rose: r = sin(n·θ), sampled at d-degree steps
// Connected sample points form a star-like figure over the underlying rose curve.

const c = document.getElementById('c');
const ctx = c.getContext('2d');
const info = document.getElementById('info');

const isIframe = window.self !== window.top;
if (isIframe) {
  document.querySelector('.back-btn').style.display = 'none';
  document.getElementById('info').style.display = 'none';
}

let W, H, CX, CY, R;
function resize() {
  W = c.width = innerWidth;
  H = c.height = innerHeight;
  CX = W / 2; CY = H / 2;
  R = Math.min(W, H) * 0.42;
}
resize();
addEventListener('resize', resize);

// curated interesting (n, d) pairs
const presets = [
  [2, 29], [3, 71], [4, 29], [5, 29],
  [6, 71], [7, 19], [3, 29], [4, 71],
  [5, 71], [6, 29], [7, 71], [8, 29],
  [2, 43], [3, 19], [5, 19], [6, 19],
  [7, 43], [4, 43], [8, 43], [9, 71],
];
let presetIdx = 0;

// current target n and d (smoothly animated)
let targetN = 2, targetD = 29;
let curN = 2, curD = 29;
let autoAnimate = true;
let autoTimer = 0;
let holdSec = 3.0;

let mx = -1, my = -1;
addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  autoAnimate = false;
});
addEventListener('touchmove', e => {
  e.preventDefault();
  mx = e.touches[0].clientX; my = e.touches[0].clientY;
  autoAnimate = false;
}, { passive: false });
addEventListener('touchend', () => { autoAnimate = true; });
addEventListener('dblclick', () => { autoAnimate = true; });

// draw the smooth underlying rose r = sin(n*t), faint
function drawRose(n, alpha) {
  ctx.beginPath();
  const steps = 1200;
  for (let i = 0; i <= steps; i++) {
    const t = (i / steps) * 2 * Math.PI;
    const r = Math.sin(n * t);
    const x = CX + R * r * Math.cos(t);
    const y = CY + R * r * Math.sin(t);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = `hsla(200,60%,65%,${alpha})`;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 1;
  ctx.stroke();
}

// draw the Maurer star: sample at k*d degrees (k=0..360), connect consecutive pts
function drawMaurerStar(n, d, progress) {
  const steps = Math.floor(progress * 360);
  if (steps < 2) return;
  ctx.beginPath();
  for (let k = 0; k <= steps; k++) {
    const t = (k * d) * Math.PI / 180;
    const r = R * Math.sin(n * t);
    const x = CX + r * Math.cos(t);
    const y = CY + r * Math.sin(t);
    k === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  // gradient from cyan to magenta
  const g = ctx.createLinearGradient(CX - R, CY, CX + R, CY);
  g.addColorStop(0, 'hsl(180,90%,60%)');
  g.addColorStop(0.5, 'hsl(280,90%,70%)');
  g.addColorStop(1, 'hsl(330,90%,60%)');
  ctx.strokeStyle = g;
  ctx.lineWidth = 1.4;
  ctx.stroke();
}

// glow pass
function drawMaurerGlow(n, d, progress) {
  const steps = Math.floor(progress * 360);
  if (steps < 2) return;
  ctx.beginPath();
  for (let k = 0; k <= steps; k++) {
    const t = (k * d) * Math.PI / 180;
    const r = R * Math.sin(n * t);
    const x = CX + r * Math.cos(t);
    const y = CY + r * Math.sin(t);
    k === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'hsla(270,100%,80%,0.15)';
  ctx.lineWidth = 5;
  ctx.filter = `blur(${Math.min(W, H) * 0.004}px)`;
  ctx.stroke();
  ctx.filter = 'none';
}

// animation state
let drawProgress = 0;
let phase = 'draw'; // draw | hold | fade
let fadeAlpha = 1;
let lastT = 0;
const DRAW_SPEED = 0.9; // full draw in ~1.1s

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function lerp(a, b, t) { return a + (b - a) * t; }

function snap(v) { return Math.round(v * 2) / 2; } // snap to 0.5 steps for n

function tick(t) {
  const dt = Math.min((t - lastT) / 1000, 0.05);
  lastT = t;

  // update n and d from mouse or auto
  if (!autoAnimate && mx >= 0) {
    const nTarget = 1 + Math.round((mx / W) * 11); // n: 1..12
    const dTarget = 1 + Math.round((my / H) * 358); // d: 1..359
    targetN = clamp(nTarget, 1, 12);
    targetD = clamp(dTarget, 1, 359);
  }

  if (autoAnimate) {
    autoTimer -= dt;
    if (autoTimer <= 0) {
      const [pn, pd] = presets[presetIdx % presets.length];
      targetN = pn; targetD = pd;
      presetIdx++;
      autoTimer = holdSec;
    }
  }

  // smooth interpolation toward target
  curN = lerp(curN, targetN, 0.04);
  curD = lerp(curD, targetD, 0.04);
  const n = Math.max(1, curN);
  const d = Math.max(1, Math.min(359, Math.round(curD)));

  // draw progress animation
  if (phase === 'draw') {
    drawProgress = Math.min(1, drawProgress + DRAW_SPEED * dt);
    if (drawProgress >= 1) { phase = 'hold'; autoTimer = Math.max(autoTimer, 2.5); }
  } else if (phase === 'hold') {
    if (autoAnimate) {
      autoTimer -= 0;
      // handled above; switch to fade when preset changes
      const [pn, pd] = presets[(presetIdx - 1) % presets.length];
      if (targetN !== Math.round(curN) || targetD !== Math.round(curD)) {
        phase = 'fade'; fadeAlpha = 1;
      }
    }
  } else if (phase === 'fade') {
    fadeAlpha -= dt * 2;
    if (fadeAlpha <= 0) { fadeAlpha = 0; drawProgress = 0; phase = 'draw'; }
  }

  const alpha = phase === 'fade' ? fadeAlpha : 1;

  // background
  ctx.fillStyle = '#06060a';
  ctx.fillRect(0, 0, W, H);

  // subtle vignette
  const vg = ctx.createRadialGradient(CX, CY, R * 0.6, CX, CY, R * 1.4);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);

  ctx.globalAlpha = alpha;
  drawRose(n, 0.22);
  drawMaurerGlow(n, d, drawProgress);
  drawMaurerStar(n, d, drawProgress);
  ctx.globalAlpha = 1;

  // info
  if (!isIframe) {
    info.textContent = `n=${Math.round(n)} d=${d}` + (autoAnimate ? '  |  auto' : '  |  mouse');
  }

  // reset phase when params change a lot during hold
  if (phase === 'hold' && (Math.abs(curN - targetN) > 0.8 || Math.abs(curD - targetD) > 3)) {
    phase = 'fade'; fadeAlpha = 1;
  }

  requestAnimationFrame(tick);
}

requestAnimationFrame(t => { lastT = t; tick(t); });
</script>
</body>
</html>
