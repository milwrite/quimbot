<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"/>
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3QgZmlsbD0iIzBhMGEwYSIgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIi8+CiAgPHBhdGggZD0iTTggOCBMMjQgOCBMMjQgMjQgTDggMjQgWiBNMTIgMTIgTDIwIDEyIEwyMCAyMCBMMTIgMjAgWiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZTBlMGUwIiBzdHJva2Utd2lkdGg9IjEuNSIvPgo8L3N2Zz4K"/>
<title>Aurora</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none}
.back-btn{position:fixed;top:calc(12px + env(safe-area-inset-top));right:calc(12px + env(safe-area-inset-right));background:rgba(20,20,20,0.8);border:1px solid #444;color:#e0e0e0;padding:8px 14px;border-radius:6px;font:12px ui-monospace,monospace;cursor:pointer;text-decoration:none;backdrop-filter:blur(8px);z-index:1000;transition:border-color 0.2s}
.back-btn:hover{border-color:#888}
#info{position:fixed;bottom:calc(12px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:6px;font:12px/1.4 ui-monospace,monospace;pointer-events:none;text-align:center;white-space:nowrap}
</style>
</head>
<body>
<a href="../" class="back-btn" id="backBtn">← Gallery</a>
<canvas id="c"></canvas>
<div id="info" id="infoEl">Aurora Borealis · solar wind particles trapped in Earth's magnetic field</div>
<script>
if(window.self!==window.top){
  document.getElementById('backBtn').style.display='none';
  document.getElementById('infoEl').style.display='none';
}

const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H,stars=[],t=0;

function resize(){
  W=c.width=innerWidth;H=c.height=innerHeight;
  stars=[];
  for(let i=0;i<180;i++){
    stars.push({
      x:Math.random(),
      y:Math.random()*0.85,
      r:Math.random()*1.1+0.2,
      p:Math.random()*Math.PI*2,
      s:Math.random()*1.8+0.5
    });
  }
}

// Low-frequency smooth oscillator
function wave(x,t,freq,phase,speed){
  return Math.sin(x*freq+t*speed+phase)*0.7
       + Math.sin(x*freq*0.43+t*speed*1.3+phase+1.2)*0.3;
}

// Aurora band definitions
// baseY: center height (0=top,1=bottom), thickness, hue, multiple wave layers
const BANDS=[
  {baseY:0.30, thick:0.12, hue:145, sat:100, lit:60, spd:0.006, freq:2.1, ph:0.0, alpha:0.55},
  {baseY:0.25, thick:0.08, hue:170, sat:100, lit:65, spd:0.009, freq:3.3, ph:2.1, alpha:0.45},
  {baseY:0.35, thick:0.14, hue:280, sat: 90, lit:65, spd:0.007, freq:1.8, ph:4.4, alpha:0.38},
  {baseY:0.20, thick:0.07, hue:195, sat:100, lit:70, spd:0.005, freq:4.0, ph:1.6, alpha:0.42},
  {baseY:0.40, thick:0.10, hue:130, sat:100, lit:55, spd:0.010, freq:2.7, ph:3.0, alpha:0.35},
];

function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#000204');
  g.addColorStop(0.5,'#010609');
  g.addColorStop(1,'#020d10');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);
}

function drawStars(){
  ctx.save();
  stars.forEach(s=>{
    const tw=0.5+0.5*Math.sin(t*0.02*s.s+s.p);
    ctx.beginPath();
    ctx.arc(s.x*W,s.y*H,s.r*0.65,0,Math.PI*2);
    ctx.fillStyle=`rgba(220,235,255,${(0.2+0.5*tw)*0.8})`;
    ctx.fill();
  });
  ctx.restore();
}

function drawBand(b){
  const N=100;
  const pts_top=[], pts_bot=[];

  for(let i=0;i<=N;i++){
    const xf=i/N;
    // Top edge wave
    const wt=wave(xf,t,b.freq,b.ph,b.spd)
            *0.04
            + wave(xf,t,b.freq*2.3,b.ph+0.7,b.spd*1.7)*0.015;
    // Bottom edge has slightly different wave
    const wb=wave(xf,t,b.freq*1.4,b.ph+1.5,b.spd*0.9)
            *0.035
            + wave(xf,t,b.freq*0.7,b.ph+3.1,b.spd*1.4)*0.02;

    pts_top.push({x:xf*W, y:(b.baseY + wt)*H});
    pts_bot.push({x:xf*W, y:(b.baseY + b.thick + wb)*H});
  }

  // Draw multiple passes for glow depth
  for(let pass=0;pass<3;pass++){
    const expand=pass*0.2; // bloat for outer glow passes
    const passAlpha=pass===0 ? b.alpha : b.alpha*(0.3-pass*0.08);

    // Use vertical gradient (curtain: bright in middle, fade at edges)
    const midTopY=pts_top[Math.floor(N/2)].y;
    const midBotY=pts_bot[Math.floor(N/2)].y;
    const g=ctx.createLinearGradient(0,midTopY-expand*H,0,midBotY+expand*H);

    const hAdj=b.hue+(pass*8); // slight hue shift for outer glow
    g.addColorStop(0,   `hsla(${hAdj},${b.sat}%,${b.lit}%,0)`);
    g.addColorStop(0.15,`hsla(${hAdj},${b.sat}%,${b.lit}%,${passAlpha*0.5})`);
    g.addColorStop(0.45,`hsla(${hAdj},${b.sat}%,${b.lit}%,${passAlpha})`);
    g.addColorStop(0.6, `hsla(${hAdj},${b.sat}%,${b.lit}%,${passAlpha*0.8})`);
    g.addColorStop(0.85,`hsla(${hAdj},${b.sat}%,${b.lit}%,${passAlpha*0.3})`);
    g.addColorStop(1,   `hsla(${hAdj},${b.sat}%,${b.lit}%,0)`);

    ctx.save();
    ctx.globalCompositeOperation='screen';
    ctx.beginPath();
    ctx.moveTo(pts_top[0].x, pts_top[0].y-expand*H*0.5);
    for(const p of pts_top) ctx.lineTo(p.x, p.y-expand*H*0.5);
    for(let i=pts_bot.length-1;i>=0;i--) ctx.lineTo(pts_bot[i].x, pts_bot[i].y+expand*H*0.5);
    ctx.closePath();
    ctx.fillStyle=g;
    ctx.fill();
    ctx.restore();
  }
}

// Thin ground silhouette for grounding
function drawGround(){
  const g=ctx.createLinearGradient(0,H*0.82,0,H);
  g.addColorStop(0,'#030f0a');
  g.addColorStop(1,'#000');
  ctx.fillStyle=g;
  ctx.fillRect(0,H*0.82,W,H*0.18);
  // Treeline — simple jagged silhouette
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.moveTo(0,H);
  const treeN=Math.ceil(W/12)+2;
  for(let i=0;i<=treeN;i++){
    const x=i/treeN*W;
    const h=(0.05+Math.abs(Math.sin(i*2.3+7)*0.04+Math.sin(i*5.1+2)*0.025))*H;
    ctx.lineTo(x-W/treeN*0.5, H-h*0.3);
    ctx.lineTo(x, H-h);
    ctx.lineTo(x+W/treeN*0.5, H-h*0.3);
  }
  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.fill();
}

function frame(){
  t++;
  drawSky();
  drawStars();
  // Draw bands back-to-front
  BANDS.forEach(drawBand);
  drawGround();
  requestAnimationFrame(frame);
}

window.addEventListener('resize',resize);
resize();
frame();
</script>
</body>
</html>
